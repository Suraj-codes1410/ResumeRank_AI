# Config specifically active under "test" profile.
# IMPORTANT SAFEGUARD NOTE FOR DEVELOPERS & CI:
# All Spring test classes (@SpringBootTest, @WebMvcTest, etc.) MUST declare @ActiveProfiles("test").
# If a test passes locally (where a real Postgres server on port 5432 may be running) but fails in CI
# with "Connection to localhost:5432 refused" or "DataSource not configured", it indicates that the
# test class is missing @ActiveProfiles("test") and fell back to default application.yml properties.

spring:
  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

  test:
    database:
      replace: none