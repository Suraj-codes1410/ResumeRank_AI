# =============================================================================
# AI Service CI Pipeline - FastAPI + Python 3.12
# =============================================================================
# Triggers only when aiservice/** files change.
# Runs linting, formatting, type checking, tests, coverage, and startup check.
# =============================================================================

name: AI Service CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'aiservice/**'
      - '.github/workflows/ai-service-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'aiservice/**'
      - '.github/workflows/ai-service-ci.yml'

concurrency:
  group: ai-service-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  WORKING_DIR: aiservice

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint & Format
  # ---------------------------------------------------------------------------
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: aiservice/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black mypy pytest-cov

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Black formatting check
        run: black --check --diff .

      - name: MyPy type checking
        run: mypy . --ignore-missing-imports --no-error-summary || true

  # ---------------------------------------------------------------------------
  # Job 2: Tests & Coverage
  # ---------------------------------------------------------------------------
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-format]
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: aiservice/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run Pytest with coverage
        run: pytest --cov=. --cov-report=xml --cov-report=html -v
        env:
          OPENROUTER_API_KEY: test-key-not-real
          INTERNAL_SERVICE_TOKEN: test-token-not-real
          BACKEND_WEBHOOK_URL: http://localhost:8080/api/internal/ai-webhook

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-service-coverage
          path: |
            aiservice/coverage.xml
            aiservice/htmlcov/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3: Startup Verification
  # ---------------------------------------------------------------------------
  verify-startup:
    name: Verify FastAPI Starts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test]
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: aiservice/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify FastAPI app starts
        run: |
          timeout 10 uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -f http://localhost:8000/health || curl -f http://localhost:8000/docs || echo "App started (no health endpoint)"
          kill %1 || true
        env:
          OPENROUTER_API_KEY: test-key-not-real
          INTERNAL_SERVICE_TOKEN: test-token-not-real
          BACKEND_WEBHOOK_URL: http://localhost:8080/api/internal/ai-webhook

  # ---------------------------------------------------------------------------
  # Job 4: Repository Standards
  # ---------------------------------------------------------------------------
  repo-standards:
    name: Repository Standards
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check no .env files committed
        run: |
          if [ -f .env ]; then
            echo "::error::Found .env file committed to aiservice/"
            exit 1
          fi
          echo "✅ No .env files found"

      - name: Check no TODO/FIXME in production code
        run: |
          FOUND=$(grep -rn 'TODO\|FIXME' *.py || true)
          if [ -n "$FOUND" ]; then
            echo "::warning::Found TODO/FIXME comments:"
            echo "$FOUND"
          fi
