# =============================================================================
# Secret Scan - Detect Leaked Credentials
# =============================================================================
# Runs on every push.
# Uses GitLeaks to detect API keys, JWT secrets, database URLs, private keys.
# Fails immediately if secrets are found.
# =============================================================================

name: Secret Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: GitLeaks Scan
  # ---------------------------------------------------------------------------
  gitleaks:
    name: GitLeaks Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 2: Custom Pattern Scan
  # ---------------------------------------------------------------------------
  custom-scan:
    name: Custom Secret Patterns
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for API keys and secrets
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          PATTERNS=(
            "OPENROUTER_API_KEY[[:space:]]*=[[:space:]]*['\"].+['\"]"
            "RESEND_API_KEY[[:space:]]*=[[:space:]]*['\"].+['\"]"
            "CLOUDINARY.*secret[[:space:]]*=[[:space:]]*['\"].+['\"]"
            "jwt\.secret[[:space:]]*=[[:space:]]*['\"].+['\"]"
            "DATABASE_URL[[:space:]]*=[[:space:]]*postgres://"
            "INTERNAL_SERVICE_TOKEN[[:space:]]*=[[:space:]]*[a-f0-9]{32,}"
            "-----BEGIN.*PRIVATE KEY-----"
            "\bsk-[a-zA-Z0-9]{20,}\b"
            "\bre_[a-zA-Z0-9]{20,}\b"
          )

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rnIE \
              --exclude-dir=.github \
              --exclude-dir=docs \
              --exclude-dir=node_modules \
              --exclude-dir=target \
              --exclude-dir=__pycache__ \
              --exclude-dir=.git \
              --exclude=.env \
              --exclude=.env.local \
              --exclude=.env.example \
              -e "$pattern" --include='*.java' --include='*.py' --include='*.ts' --include='*.tsx' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.properties' . \
              || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::Potential secret found matching pattern: $pattern"
              echo "$MATCHES"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 1 ]; then
            echo "::error::❌ Secrets detected! Review and remove before merging."
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"
