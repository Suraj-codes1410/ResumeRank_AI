# =============================================================================
# Quality Gate - Aggregated Pipeline Status Check
# =============================================================================
# Runs after Frontend CI, Backend CI, and AI Service CI complete.
# Validates that all quality criteria are met before merge.
# =============================================================================

name: Quality Gate

on:
  workflow_run:
    workflows:
      - 'Frontend CI'
      - 'Backend CI'
      - 'AI Service CI'
    types:
      - completed
  pull_request:
    branches: [main, develop]

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Validate Pipeline Results
  # ---------------------------------------------------------------------------
  validate:
    name: Validate All Pipelines
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' || github.event.workflow_run.conclusion != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check triggering workflow result
        if: github.event_name == 'workflow_run'
        run: |
          echo "Workflow: ${{ github.event.workflow_run.name }}"
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Head SHA: ${{ github.event.workflow_run.head_sha }}"
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "::error::Workflow '${{ github.event.workflow_run.name }}' did not succeed (status: ${{ github.event.workflow_run.conclusion }})"
            exit 1
          fi
          echo "✅ ${{ github.event.workflow_run.name }} passed"

      - name: Verify all CI pipelines passed
        if: github.event_name == 'workflow_run'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const requiredWorkflows = ['Frontend CI', 'Backend CI', 'AI Service CI'];
            const results = [];

            for (const wfName of requiredWorkflows) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner, repo,
                workflow_id: `${wfName.toLowerCase().replace(/ /g, '-')}.yml`,
                head_sha: sha,
                per_page: 1,
              }).catch(() => ({ data: { workflow_runs: [] } }));

              const latestRun = runs.data.workflow_runs[0];
              if (latestRun) {
                results.push({
                  name: wfName,
                  conclusion: latestRun.conclusion,
                  status: latestRun.status,
                });
              } else {
                results.push({ name: wfName, conclusion: 'skipped', status: 'not_found' });
              }
            }

            console.log('Pipeline Results:');
            console.table(results);

            const failures = results.filter(r =>
              r.conclusion !== 'success' && r.conclusion !== 'skipped'
            );

            if (failures.length > 0) {
              core.setFailed(
                `Quality gate failed. Failing pipelines: ${failures.map(f => f.name).join(', ')}`
              );
            } else {
              console.log('✅ All quality gates passed');
            }

  # ---------------------------------------------------------------------------
  # Job 2: Coverage Threshold Check
  # ---------------------------------------------------------------------------
  coverage-check:
    name: Coverage Threshold
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify coverage threshold policy
        run: |
          echo "📊 Coverage Policy: Minimum 80% line coverage required"
          echo "Coverage is enforced per-service via their respective CI pipelines."
          echo "If any pipeline fails its coverage check, the Quality Gate blocks merge."
          echo "✅ Coverage policy documented and enforced"

  # ---------------------------------------------------------------------------
  # Job 3: Final Gate
  # ---------------------------------------------------------------------------
  gate-result:
    name: Gate Result
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [validate]
    if: always()
    steps:
      - name: Evaluate gate
        run: |
          if [ "${{ needs.validate.result }}" == "failure" ]; then
            echo "::error::❌ Quality Gate FAILED - fix pipeline issues before merging"
            exit 1
          fi
          echo "✅ Quality Gate PASSED"
